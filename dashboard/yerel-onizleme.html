<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>VALEO · Kalite & Iskarta Paneli — Yerel Önizleme</title>
  <link rel="stylesheet" href="kaynak/tasarim-sistemi.css">
</head>
<!--
  Yerel önizleme: Apps Script'e deploy etmeden tarayıcıda görmek içindir.
  Veri yolu ve (istersen) logo URL'si body data-* ile verilir; satır içi script yoktur.
  Gerçek logoyu yerelde görmek istersen Drive dosyasını "Bağlantısı olan herkes — Görüntüleyen"
  yapıp aşağıdaki data-logo'yu aç:
  data-logo="https://drive.google.com/thumbnail?id=19SWUei7Rio5AbOEFv682ObI4kJugYGMU&sz=w240"
-->
<body data-veri="../veri/veri.json">
  <div class="uygulama">
    <header class="ust-serit">
      <div class="marka">
        <span class="logo-kutu"><img id="logo" alt="VALEO"></span>
        <div class="marka-yazi">
          <div class="baslik">Kalite &amp; Iskarta Kontrol Paneli</div>
          <div class="alt-baslik">S2 · Kalite Mühendisi Panosu · (yerel önizleme)</div>
        </div>
      </div>
      <div class="guncelleme" id="guncelleme">Son güncelleme: —</div>
    </header>

    <nav class="sekmeler" role="tablist" aria-label="Pano sekmeleri">
      <button class="sekme aktif" data-ekran="e1" role="tab" aria-selected="true" type="button">Genel Bakış</button>
      <button class="sekme" data-ekran="e2" role="tab" aria-selected="false" type="button">Trend</button>
      <button class="sekme" data-ekran="e3" role="tab" aria-selected="false" type="button">Pareto</button>
      <button class="sekme" data-ekran="e4" role="tab" aria-selected="false" type="button">Kritik Tablo</button>
    </nav>

    <div class="filtre-cubugu">
      <label for="filtreHat">Hat filtresi:</label>
      <select id="filtreHat"><option value="Hepsi">Tüm Hatlar</option></select>
      <span id="kayitBilgi"></span>
    </div>

    <main id="icerik"></main>
  </div>

  <script src="kaynak/veri-katmani.js"></script>
  <script src="kaynak/grafikler.js"></script>
  <script src="kaynak/uygulama.js"></script>
</body>
</html>
